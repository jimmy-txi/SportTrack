name: Test Spring Boot App

on:
  push:
    branches:
      - main
      - prod
  pull_request:
    branches:
      - dev
      - main
jobs:
  test:
    name: Build and run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: zulu
          cache: maven
      - name: Prepare sqlite folder
        run: mkdir -p data
        run: cd data/
        run: mkdir -p db
      - name: Build and run tests
        run: mvn -B verify
