name: Deploy Javadoc

on:
  workflow_run:
    workflows: ["Test Spring Boot App"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'prod'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Generate Javadoc
        run: |
          chmod +x mvnw || true
          ./mvnw clean javadoc:javadoc

      - name: Verify Javadoc output
        run: |
          if [ ! -d "target/site/apidocs" ]; then
            echo "Le dossier target/site/apidocs est introuvable"
            find target -maxdepth 4 -type d || true
            exit 1
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/apidocs

  deploy:
    needs: build
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'prod'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4