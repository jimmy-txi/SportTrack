name: Deploy Javadoc

on:
  workflow_run:
    workflows: ["Test Spring Boot App"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'prod'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source workflow commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Generate Javadoc
        run: |
          chmod +x mvnw || true
          ./mvnw clean javadoc:javadoc

      - name: Debug generated files
        run: |
          echo "HEAD SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "HEAD BRANCH: ${{ github.event.workflow_run.head_branch }}"
          pwd
          ls -la
          find . -maxdepth 5 -type d | sort
          find . -maxdepth 5 -type f | sort | grep -E "index\.html|apidocs|javadoc" || true

      - name: Ensure Javadoc exists
        run: |
          if [ -d "target/site/apidocs" ]; then
            echo "Javadoc trouvé dans target/site/apidocs"
          else
            echo "Javadoc introuvable"
            exit 1
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/apidocs

  deploy:
    needs: build
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'prod'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4