name: Deploy Javadoc

on:
  push:
    branches:
      - prod
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy-javadoc:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Generate Javadoc
        run: |
          chmod +x mvnw || true
          ./mvnw -B clean javadoc:javadoc -Ddoclint=none
          test -f target/apidocs/index.html

      - name: Prepare Pages artifact
        run: |
          rm -rf javadoc-site
          mkdir -p javadoc-site
          cp -R target/apidocs/. javadoc-site/
          test -f javadoc-site/index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./javadoc-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
