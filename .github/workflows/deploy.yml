name: Deploy SportTrack

on:
  workflow_run:
    workflows: ["Test Spring Boot App"]
    types:
      - completed

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'prod'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build jar
        run: |
          chmod +x mvnw || true
          ./mvnw clean package -DskipTests

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 400 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload jar
        run: |
          scp target/*.jar ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/sporttrack.jar

      - name: Deploy on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            sudo mv /tmp/sporttrack.jar /opt/sporttrack/app.jar
            sudo chown springboot:springboot /opt/sporttrack/app.jar
            sudo systemctl restart sporttrack
            sudo systemctl status sporttrack --no-pager
          EOF