<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - SportTrack</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div th:insert="~{fragments/header :: header}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h2 class="mb-1"><i class="bi bi-bell-fill me-2"></i>Notifications</h2>
            <p class="text-body-secondary mb-0">Retrouvez les messages importants de votre espace SportTrack.</p>
        </div>
        <form th:action="@{/notifications/read-all}" method="post" th:if="${unreadCount > 0}">
            <button type="submit" class="btn btn-outline-primary">
                <i class="bi bi-check2-all"></i> Tout marquer comme lu
            </button>
        </form>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm">
        <div class="list-group list-group-flush">
            <div th:if="${#lists.isEmpty(notifications)}" class="list-group-item text-center text-muted py-5">
                <i class="bi bi-bell-slash display-5"></i>
                <p class="mb-0 mt-2">Aucune notification pour le moment.</p>
            </div>

            <div th:each="notification : ${notifications}" class="list-group-item" th:classappend="${notification.seen} ? 'opacity-75' : 'bg-white'">
                <div class="d-flex justify-content-between align-items-start gap-3">
                    <div class="flex-grow-1">
                        <div class="d-flex align-items-center gap-2 mb-1">
                            <span class="badge text-bg-primary" th:text="${notification.title}">Titre</span>
                            <span class="badge text-bg-secondary" th:text="${notification.type}">Type</span>
                            <span th:if="${!notification.seen}" class="badge text-bg-danger">Nouveau</span>
                        </div>
                        <p class="mb-1" th:text="${notification.content}">Contenu</p>
                        <small class="text-muted" th:text="${#temporals.format(notification.createdAt, 'dd/MM/yyyy HH:mm')}">date</small>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <a th:href="@{/notifications/open/{id}(id=${notification.id})}" class="btn btn-outline-primary btn-sm">
                            Ouvrir
                        </a>
                        <form th:if="${!notification.seen}" th:action="@{/notifications/{id}/read(id=${notification.id})}" method="post" class="m-0">
                            <button type="submit" class="btn btn-primary btn-sm">Marquer lu</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
