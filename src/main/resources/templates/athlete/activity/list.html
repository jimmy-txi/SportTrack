<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes Activités</title>
    <th:block th:replace="~{fragments/assets :: headAssets}"></th:block>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div th:insert="~{fragments/header :: header}"></div>
<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-activity"></i> Mes Activités</h1>
        <div>
            <a th:href="@{/}" class="btn btn-secondary btn-sm me-2">
                <i class="bi bi-arrow-left"></i> Retour
            </a>
            <a th:href="@{/athlete/activities/create}" class="btn btn-primary btn-sm">
                <i class="bi bi-plus"></i> Nouvelle activité
            </a>
        </div>
    </div>

    <div th:if="${param.created}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> Activité créée avec succès.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${param.updated}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> Activité modifiée avec succès.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${param.deleted}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> Activité supprimée avec succès.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle"></i> <span th:text="${param.error}">Erreur</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <div th:if="${activities.isEmpty()}" class="text-center text-muted py-5">
                <i class="bi bi-inbox fs-1"></i>
                <p class="mt-3">Aucune activité enregistrée pour le moment.</p>
            </div>

            <div th:if="${!activities.isEmpty()}" class="row g-3">
                <div class="col-12" th:each="activity : ${activities}">
                    <div class="card border">
                        <div class="card-body pb-2">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h5 class="card-title text-primary mb-1">
                                        <i class="bi bi-activity"></i> <span th:text="${activity.title}"></span>
                                    </h5>
                                    <h6 class="card-subtitle mb-2 text-muted">
                                        <i class="bi bi-calendar"></i> <span th:text="${activity.dateA}"></span>
                                        <i class="bi bi-clock ms-2"></i> <span th:text="${activity.startTime}"></span>
                                        <i class="bi bi-geo-alt ms-2"></i> <span th:text="${activity.locationCity}"></span>
                                        <span th:if="${activity.weatherReport != null}" class="ms-2">
                                            <i th:class="'bi ' + ${activity.weatherReport.weatherIconClass}"></i> <span th:text="${activity.weatherReport.weatherLabel}"></span>
                                        </span>
                                    </h6>
                                </div>
                            </div>
                            <p class="card-text mb-3" th:if="${activity.description != null}" th:text="${activity.description}"></p>
                            
                            <div class="d-flex flex-wrap gap-4 mb-3 small">
                                <div><i class="bi bi-stopwatch text-secondary"></i> <strong>Durée:</strong> <span th:text="${activity.duration} + ' h'"></span></div>
                                <div th:if="${activity.distance != null and activity.distance > 0}"><i class="bi bi-signpost-split text-secondary"></i> <strong>Distance:</strong> <span th:text="${activity.distance} + ' km'"></span></div>
                                <div><i class="bi bi-lightning text-warning"></i> <strong>Calories:</strong> <span th:text="${#numbers.formatDecimal(activity.caloriesBurned, 1, 1)} + ' kcal'"></span></div>
                            </div>
                            
                            <!-- Card Actions -->
                            <hr class="mt-0 mb-2">
                            <div class="d-flex justify-content-between align-items-center">
                                <button class="btn btn-sm btn-outline-secondary" type="button" data-bs-toggle="collapse" th:data-bs-target="'#comments-' + ${activity.id}" aria-expanded="false">
                                    <i class="bi bi-chat-text"></i> <span th:text="${#lists.size(activity.comments)}">0</span> Commentaires
                                </button>
                                
                                <div>
                                    <a th:href="@{/athlete/activities/edit/{id}(id=${activity.id})}" class="btn btn-sm btn-outline-primary me-2">
                                        <i class="bi bi-pencil"></i> Modifier
                                    </a>
                                    <form th:action="@{/athlete/activities/delete/{id}(id=${activity.id})}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Supprimer cette activité ?');">
                                            <i class="bi bi-trash"></i> Supprimer
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Comments Collapse -->
                        <div class="collapse bg-light border-top" th:id="'comments-' + ${activity.id}">
                            <div class="card-body p-3">
                                <div class="d-flex flex-column gap-2">
                                    <!-- Existing Comments -->
                                    <div th:if="${!#lists.isEmpty(activity.comments)}" class="border-start border-3 border-primary ps-3 mb-2">
                                        <div th:each="c : ${activity.comments}" class="mb-2">
                                            <a th:href="@{/friends/profile/{id}(id=${c.author.id})}" class="fw-bold text-dark text-decoration-none me-1" th:text="${c.author.username}">User</a>
                                            <small class="text-muted" th:text="${#temporals.format(c.createdAt, 'dd/MM HH:mm')}"></small>
                                            <span th:if="${c.interactionType.name() != 'NONE'}" class="ms-2 fs-5">
                                                <i th:if="${c.interactionType.name() == 'LIKE'}" class="bi bi-hand-thumbs-up text-primary"></i>
                                                <i th:if="${c.interactionType.name() == 'CHEER'}" class="bi bi-fire text-danger"></i>
                                                <i th:if="${c.interactionType.name() == 'AVERAGE'}" class="bi bi-emoji-neutral text-info"></i>
                                            </span>
                                            <div class="mt-1 small" th:if="${c.content != null and !#strings.isEmpty(c.content)}" th:text="${c.content}">Content</div>
                                        </div>
                                    </div>
                                    <div th:if="${#lists.isEmpty(activity.comments)}" class="text-muted small fst-italic mb-2">
                                        Aucune réaction pour le moment.
                                    </div>
                                    
                                    <!-- interaction form -->
                                    <form th:action="@{/comments/add}" method="post" class="bg-white p-2 rounded shadow-sm border">
                                        <input type="hidden" name="activityId" th:value="${activity.id}" />
                                        <input type="hidden" name="redirectUrl" th:value="'/athlete/activities'" />
                                        
                                        <!-- Hidden default for interactionType -->
                                        <input type="radio" name="interactionType" value="NONE" checked style="display:none;" />
                                        
                                        <!-- Action Buttons Row -->
                                        <div class="btn-group mb-2" role="group" aria-label="Interactions">
                                            <input type="radio" class="btn-check" name="interactionType" th:id="'like-my-' + ${activity.id}" value="LIKE" autocomplete="off">
                                            <label class="btn btn-sm btn-outline-primary" th:for="'like-my-' + ${activity.id}" title="J'aime">
                                                <i class="bi bi-hand-thumbs-up"></i>
                                            </label>

                                            <input type="radio" class="btn-check" name="interactionType" th:id="'cheer-my-' + ${activity.id}" value="CHEER" autocomplete="off">
                                            <label class="btn btn-sm btn-outline-danger" th:for="'cheer-my-' + ${activity.id}" title="Courage">
                                                <i class="bi bi-fire"></i>
                                            </label>

                                            <input type="radio" class="btn-check" name="interactionType" th:id="'average-my-' + ${activity.id}" value="AVERAGE" autocomplete="off">
                                            <label class="btn btn-sm btn-outline-info" th:for="'average-my-' + ${activity.id}" title="Bof">
                                                <i class="bi bi-emoji-neutral"></i>
                                            </label>
                                        </div>
                                        
                                        <!-- Text Comment Row -->
                                        <div class="input-group input-group-sm">
                                            <input type="text" name="content" class="form-control" placeholder="Ajouter un commentaire..." aria-label="Comment">
                                            <button class="btn btn-primary" type="submit">
                                                <i class="bi bi-send"></i>
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:insert="~{fragments/footer :: footer}"></div>
    <th:block th:replace="~{fragments/assets :: bodyScripts}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.btn-check').forEach(function(radio) {
            radio.addEventListener('click', function(e) {
                if (this.previousChecked) {
                    this.checked = false;
                    const form = this.closest('form');
                    if (form) {
                        const noneRadio = form.querySelector('input[type="radio"][value="NONE"]');
                        if (noneRadio) noneRadio.checked = true;
                    }
                }
                const name = this.name;
                document.querySelectorAll('input[name="' + name + '"]').forEach(function(el) {
                    el.previousChecked = el.checked;
                });
            });
            radio.previousChecked = radio.checked;
        });
    });
</script>
</body>
</html>
