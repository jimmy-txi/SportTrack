<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messagerie - SportTrack</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">
<div th:insert="~{fragments/header :: header}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h2 class="mb-1"><i class="bi bi-chat-dots-fill me-2"></i>Messagerie</h2>
            <p class="text-body-secondary mb-0">Discutez en privé avec vos amis.</p>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <span class="badge rounded-pill text-bg-danger" th:if="${totalUnread > 0}" th:text="${totalUnread} + ' non lus'">0 non lus</span>
            <a th:href="@{/friends}" class="btn btn-outline-secondary">
                <i class="bi bi-people"></i> Mes amis
            </a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row g-3">
        <div class="col-12 col-lg-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-person-lines-fill me-1"></i> Conversations</span>
                    <span class="badge rounded-pill text-bg-secondary" th:text="${#lists.size(friends)}">0</span>
                </div>
                <div class="list-group list-group-flush" style="max-height: 65vh; overflow-y: auto;">
                    <div th:if="${#lists.isEmpty(friends)}" class="p-4 text-center text-muted">
                        <i class="bi bi-emoji-neutral display-6"></i>
                        <p class="mb-0 mt-2">Aucun ami à contacter.</p>
                    </div>

                    <a th:each="friend : ${friends}"
                       th:href="@{/messages(friendId=${friend.id})}"
                       class="list-group-item list-group-item-action"
                       th:classappend="${selectedFriend != null and selectedFriend.id == friend.id} ? 'active' : ''">
                        <div class="d-flex align-items-start gap-2">
                            <img th:src="${friend.profilePhotoUrl}" alt="Avatar" class="rounded-circle" width="45" height="45">
                            <div class="flex-grow-1 min-w-0">
                                <div class="fw-semibold d-flex justify-content-between align-items-center">
                                    <span th:text="${friend.username}">username</span>
                                    <span th:if="${unreadByFriend.get(friend.id) != null and unreadByFriend.get(friend.id) > 0}"
                                          class="badge rounded-pill text-bg-danger"
                                          th:text="${unreadByFriend.get(friend.id)}">0</span>
                                </div>
                                <small class="d-block text-truncate"
                                       th:if="${latestByFriend.get(friend.id) != null}"
                                       th:text="${latestByFriend.get(friend.id).content}">Dernier message</small>
                                <small class="text-muted"
                                       th:if="${latestByFriend.get(friend.id) != null}"
                                       th:text="${#temporals.format(latestByFriend.get(friend.id).sentAt, 'dd/MM HH:mm')}">date</small>
                                <small class="text-muted" th:if="${latestByFriend.get(friend.id) == null}">Aucun message</small>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-8">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-white d-flex justify-content-between align-items-center" th:if="${selectedFriend != null}">
                    <div class="d-flex align-items-center gap-2">
                        <img th:src="${selectedFriend.profilePhotoUrl}" alt="Avatar" class="rounded-circle" width="40" height="40">
                        <div>
                            <div class="fw-semibold" th:text="${selectedFriend.username}">username</div>
                            <small class="text-muted">Conversation privée</small>
                        </div>
                    </div>
                    <a th:href="@{/friends/profile/{id}(id=${selectedFriend.id})}" class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-person"></i> Voir profil
                    </a>
                </div>

                <div class="card-body" style="max-height: 55vh; overflow-y: auto;" th:if="${selectedFriend != null}">
                    <div th:if="${#lists.isEmpty(conversation)}" class="text-center text-muted py-5">
                        <i class="bi bi-chat-square-text display-5"></i>
                        <p class="mb-0 mt-2">Commencez la conversation.</p>
                    </div>

                    <div th:if="${!#lists.isEmpty(conversation)}" class="d-flex flex-column gap-2">
                        <div th:each="msg : ${conversation}" class="d-flex"
                             th:classappend="${msg.initiator.id == athlete.id} ? 'justify-content-end' : 'justify-content-start'">
                            <div class="p-2 rounded-3"
                                 th:classappend="${msg.initiator.id == athlete.id} ? 'bg-primary text-white' : 'bg-light border'"
                                 style="max-width: 75%;">
                                <div class="small mb-1" th:text="${msg.content}">Message</div>
                                <div class="small opacity-75 d-flex align-items-center gap-2">
                                    <span th:text="${#temporals.format(msg.sentAt, 'dd/MM/yyyy HH:mm')}">date</span>
                                    <span th:if="${msg.initiator.id == athlete.id}"
                                          class="fw-semibold"
                                          th:text="${msg.seen ? 'Vu' : 'Envoyé'}">Envoyé</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-footer bg-white" th:if="${selectedFriend != null}">
                    <form th:action="@{/messages/send}" method="post" class="d-flex gap-2">
                        <input type="hidden" name="recipientId" th:value="${selectedFriend.id}">
                        <input type="text" name="content" class="form-control" maxlength="2000" placeholder="Écrire un message..." required>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send"></i>
                        </button>
                    </form>
                </div>

                <div class="card-body d-flex align-items-center justify-content-center text-center text-muted py-5" th:if="${selectedFriend == null}">
                    <div>
                        <i class="bi bi-chat-dots display-4"></i>
                        <p class="mt-2 mb-0">Sélectionnez un ami pour ouvrir la conversation.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
