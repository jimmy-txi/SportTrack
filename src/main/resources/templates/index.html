<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>SportTrack Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 text-center">
    <h1>Welcome to SportTrack!</h1>
    
    <div class="mt-4" sec:authorize="!isAuthenticated()">
        <p>You are not logged in.</p>
        <a th:href="@{/login}" class="btn btn-primary m-2">Login</a>
        <a th:href="@{/register}" class="btn btn-outline-primary m-2">Register</a>
    </div>

    <div class="mt-4" sec:authorize="isAuthenticated()">
        <p class="lead">Hello, <strong sec:authentication="name"></strong>!</p>
        
        <div sec:authorize="hasRole('ADMIN')" class="alert alert-warning d-inline-block">
            You are logged in as an <strong>Administrator</strong>.
        </div>
        
        <div sec:authorize="hasRole('USER')" class="alert alert-info d-inline-block">
            You are logged in as an <strong>Athlete (User)</strong>.
        </div>

        <form th:action="@{/logout}" method="post" class="mt-3">
            <button type="submit" class="btn btn-danger">Logout</button>
        </form>
    </div>
</div>
</body>
</html>
