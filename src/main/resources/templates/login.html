<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Connexion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header text-center bg-success text-white">
                    <h4>Connexion à SportTrack</h4>
                </div>
                <div class="card-body">
                    <div th:if="${param.error}" class="alert alert-danger">
                        Email ou mot de passe invalide.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success">
                        Vous avez été déconnecté avec succès.
                    </div>
                    <div th:if="${param.registered}" class="alert alert-success">
                        Inscription réussie ! Veuillez vous connecter.
                    </div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Adresse e-mail</label>
                            <input type="email" name="email" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <input type="password" name="password" class="form-control" required/>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Se connecter</button>
                    </form>
                    <div class="text-center mt-3">
                        <a th:href="@{/register}">Vous n'avez pas de compte ? S'inscrire</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
