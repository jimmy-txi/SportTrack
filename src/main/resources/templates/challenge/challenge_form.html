<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Création de challenge</title>
    <th:block th:replace="~{fragments/assets :: headAssets}"></th:block>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
        <div th:insert="~{fragments/header :: header}"></div>
    
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h1 class="h4 mb-0"><i class="bi bi-plus-circle me-2"></i>Nouveau Challenge</h1>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/challenges}" method="post">
                            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                            
                            <div class="mb-3">
                                <label for="nom" class="form-label fw-bold">Nom du challenge</label>
                                <input type="text" class="form-control" id="nom" name="nom" 
                                placeholder="Ex : Courir la plus grande distance cette semaine" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="description" class="form-label fw-bold">Description</label>
                                <textarea class="form-control" id="description" name="description" 
                                rows="3" placeholder="Description du challenge..." required></textarea>
                            </div>
                            
                            <div class="mb-4">
                                <label for="sportId" class="form-label fw-bold">Discipline sportive</label>
                                <select class="form-select" id="sportId" name="sportId" required>
                                    <option value="" disabled selected>Choisissez un sport...</option>
                                    <option th:each="sport : ${sports}" 
                                    th:value="${sport.id}" 
                                    th:text="${sport.name}">Sport</option>
                                </select>
                            </div>
                            
                            <div class="mb-4">
                                <label for="metric" class="form-label fw-bold">Métrique (Catégorie)</label>
                                <select class="form-select" id="metric" name="metric" required>
                                    <option value="" disabled selected>Choisissez une métrique...</option>
                                    
                                    <option th:each="m : ${allMetrics}" 
                                    th:value="${m}" 
                                    th:text="${m.displayValue}">Distance / Temps / Calories</option>
                                </select>
                            </div>
                            
                            <div class="mb-4">
                                <label for="startDate" class="form-label fw-bold">Date de début</label>
                                <input type="date" class="form-control" id="startDate" name="startDate" required>
                            </div>
                            
                            <div class="mb-4">
                                <label for="endDate" class="form-label fw-bold">Date de fin</label>
                                <input type="date" class="form-control" id="endDate" name="endDate" required>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg"></i> Créer le challenge
                                </button>
                                <a th:href="@{/challenges}" class="btn btn-outline-secondary">
                                    Annuler
                                </a>
                            </div>
                            
                        </form>
                    </div>
                </div>
                
                <div class="text-center mt-3">
                    <a th:href="@{/}" class="text-decoration-none text-muted small">
                        <i class="bi bi-house"></i> Retour à l'accueil
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <div th:insert="~{fragments/footer :: footer}"></div>
    <th:block th:replace="~{fragments/assets :: bodyScripts}"></th:block>
</body>
</html>
