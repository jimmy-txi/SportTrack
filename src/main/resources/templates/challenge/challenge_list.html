<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mes challenges</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
        <div th:insert="~{fragments/header :: header}"></div>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3"><i class="bi bi-trophy me-2 text-primary"></i>Mes Challenges</h1>
            <a th:href="@{/challenges/new}" class="btn btn-primary shadow-sm">
                <i class="bi bi-plus-lg me-1"></i> Nouveau Challenge
            </a>
        </div>
        
        <div th:if="${#lists.isEmpty(challenges)}" class="alert alert-info text-center shadow-sm">
            <i class="bi bi-info-circle me-2"></i> Vous n'avez pas encore de challenges. Cliquez sur "Nouveau Challenge" pour en créer un !
        </div>
        
        <div th:if="${!#lists.isEmpty(challenges)}" class="row row-cols-1 row-cols-md-2 g-4">
            <div th:each="challenge : ${challenges}" class="col">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="card-title fw-bold text-dark" th:text="${challenge.name}">Nom du challenge</h5>
                            <span class="badge bg-primary-subtle text-primary border border-primary-subtle" 
                            th:text="${challenge.sport != null ? challenge.sport.name : 'Sport'}">Sport</span>
                        </div>
                        
                        <p class="card-text text-secondary mt-2 flex-grow-1" th:text="${challenge.description}">Description...</p>
                        
                        <div class="mt-3">
                            <small class="text-dark fw-semibold">
                                <i class="bi bi-bar-chart me-1"></i> Type du challenge : 
                                <span class="text-muted" th:text="${challenge.metric.displayValue}">Métrique</span>
                            </small>
                        </div>
                        
                        <div class="mt-2 pt-3 border-top">
                            <div class="d-flex align-items-center text-muted small">
                                <i class="bi bi-calendar3 me-2"></i>
                                <span>Du </span>
                                <strong class="mx-1" th:text="${#temporals.format(challenge.startDate, 'dd/MM/yyyy')}">01/01/2024</strong>
                                <span> au </span>
                                <strong class="mx-1" th:text="${#temporals.format(challenge.endDate, 'dd/MM/yyyy')}">31/12/2024</strong>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border-0 pb-3">
                        <small class="text-muted">
                            <i class="bi bi-people me-1"></i>
                            <span th:text="${challenge.participants.size()} + ' participant(s)'"></span>
                            <span th:if="${challenge.organizer != null}" class="ms-3 text-muted small">
                                <i class="bi bi-person me-1"></i>
                                <span th:text="|Organisé par ${challenge.organizer?.username}|">Organisé par ...</span>
                            </span>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="text-center mt-5 mb-5">
        <a th:href="@{/}" class="btn btn-link text-decoration-none text-secondary">
            <i class="bi bi-house"></i> Retour à l'accueil
        </a>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
