<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3"><i class="bi bi-trophy me-2"></i>Challenges</h1>
            <a href="/challenges/new" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i>Créer un challenge</a>
        </div>
        <div class="row">
            <div th:if="${challenges.isEmpty()}" class="col-12">
                <div class="alert alert-info text-center">
                    <i class="bi bi-info-circle me-2"></i>Aucun challenge disponible pour le moment.
                </div>
            </div>
            <div th:if="${!#lists.isEmpty(challenges)}" class="row row-cols-1 row-cols-md-2 g-4">
            <div th:each="challenge : ${challenges}" class="col">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="card-title fw-bold text-dark" th:text="${challenge.name}">Nom du challenge</h5>
                            <span class="badge bg-primary-subtle text-primary border border-primary-subtle" 
                            th:text="${challenge.sport != null ? challenge.sport.name : 'Sport'}">Sport</span>
                        </div>
                        
                        <p class="card-text text-secondary mt-2 flex-grow-1" th:text="${challenge.description}">Description...</p>
                        
                        <div class="mt-3">
                            <small class="text-dark fw-semibold">
                                <i class="bi bi-bar-chart me-1"></i> Type du challenge : 
                                <span class="text-muted" th:text="${challenge.metric.displayValue}">Métrique</span>
                            </small>
                        </div>
                        
                        <div class="mt-2 pt-3 border-top">
                            <div class="d-flex align-items-center text-muted small">
                                <i class="bi bi-calendar3 me-2"></i>
                                <span>Du </span>
                                <strong class="mx-1" th:text="${#temporals.format(challenge.startDate, 'dd/MM/yyyy')}">01/01/2024</strong>
                                <span> au </span>
                                <strong class="mx-1" th:text="${#temporals.format(challenge.endDate, 'dd/MM/yyyy')}">31/12/2024</strong>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border-0 pb-3">
                        <small class="text-muted">
                            <i class="bi bi-people me-1"></i>
                            <span th:text="${challenge.participants != null ? challenge.participants.size() : 0} + ' participant(s)'"></span>
                            <span th:if="${challenge.organizer != null}" class="ms-3 text-muted small">
                                <i class="bi bi-person me-1"></i>
                                <span th:text="|Organisé par ${challenge.organizer?.username}|">Organisé par ...</span>
                            </span>
                        </small>
                    </div>
                    <div th:with="isParticipant=${challenge.participants != null and challenge.participants.contains(athlete)}">
                        <div th:if="${isParticipant}" class="card-footer bg-transparent border-0 pb-3">
                            <span class="btn btn-secondary w-100 disabled">
                                <i class="bi bi-check-all me-1"></i>Déjà inscrit
                            </span>
                        </div>

                        <div th:unless="${isParticipant}" class="card-footer bg-transparent border-0 pb-3">
                            <a th:href="@{/challenges/participate(id=${challenge.id})}" class="btn btn-success w-100">
                                <i class="bi bi-person-plus me-1"></i>Rejoindre
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
