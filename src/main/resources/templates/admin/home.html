<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Panneau d'Administration - SportTrack</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
        <div th:insert="~{fragments/header :: header}"></div>
    <div class="container mt-5 mb-5">
        <!-- Header -->
        <div class="py-4 border-bottom">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="mb-1">Panneau d'Administration</h1>
                    <p class="mb-0">Gestion des ressources SportTrack</p>
                </div>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-light btn-sm">
                        <i class="bi bi-box-arrow-right"></i> Déconnexion
                    </button>
                </form>
            </div>
        </div>

        <!-- Management Resources Section -->
        <div class="mb-4">
            <h2 class="mb-4">
                <i class="bi bi-trophy"></i> Gestion des Sports
            </h2>
            <div class="row g-4">
                <!-- Sports Management -->
                <div class="col-md-6 col-lg-4">
                    <div class="card admin-card shadow-sm">
                        <div class="card-body text-center">
                            <div class="admin-card-icon">
                                <i class="bi bi-trophy"></i>
                            </div>
                            <h5 class="card-title">Sports</h5>
                            <p class="card-text text-muted">Gérer les types de sports disponibles</p>
                            <a th:href="@{/admin/sports}" class="btn btn-primary btn-sm">
                                <i class="bi bi-arrow-right"></i> Accéder
                            </a>
                        </div>
                    </div>
                </div>
                <!-- Activities Management -->
                <div class="col-md-6 col-lg-4">
                    <div class="card admin-card shadow-sm">
                        <div class="card-body text-center">
                            <div class="admin-card-icon">
                                <i class="bi bi-activity"></i>
                            </div>
                            <h5 class="card-title">Activités</h5>
                            <p class="card-text text-muted">Gérer les activités des utilisateurs</p>
                            <a th:href="@{/admin/activities}" class="btn btn-primary btn-sm">
                                <i class="bi bi-arrow-right"></i> Accéder
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
