<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Créer un Sport</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <!-- Header -->
        <div class="mb-4">
            <a th:href="@{/admin/sports}" class="btn btn-secondary btn-sm mb-3">
                <i class="bi bi-arrow-left"></i> Retour à la liste
            </a>
            <h1>
                <i class="bi bi-plus-circle"></i>
                <span th:if="${sport.idS == null}">Créer un nouveau sport</span>
                <span th:if="${sport.idS != null}">Modifier le sport</span>
            </h1>
        </div>

        <!-- Error Messages -->
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle"></i>
            <span th:text="${param.error}">Une erreur est survenue</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Form -->
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <form
                            th:action="@{/admin/sports/save}"
                            th:object="${sport}"
                            method="post"
                            class="needs-validation"
                            novalidate>

                            <!-- Hidden ID field for updates -->
                            <input type="hidden" th:field="*{idS}" />

                            <!-- Sport Name -->
                            <div class="mb-3">
                                <label for="name" class="form-label">
                                    <i class="bi bi-tag"></i> Nom du sport *
                                </label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="name"
                                    th:field="*{name}"
                                    placeholder="ex: Course à pied"
                                    required>
                                <div class="form-text">Le nom du sport</div>
                            </div>

                            <!-- Sport Type -->
                            <div class="mb-3">
                                <label for="type" class="form-label">
                                    <i class="bi bi-list"></i> Type de mesure *
                                </label>
                                <select
                                    class="form-select"
                                    id="type"
                                    th:field="*{type}"
                                    required>
                                    <option value="">Sélectionner un type</option>
                                    <option value="DURATION">Durée</option>
                                    <option value="REPETITION">Répétition</option>
                                    <option value="DISTANCE">Distance</option>
                                </select>
                                <div class="form-text">Comment ce sport est mesuré</div>
                            </div>

                            <!-- Calories Per Hour -->
                            <div class="mb-3">
                                <label for="caloriesPerHour" class="form-label">
                                    <i class="bi bi-fire"></i> Calories/heure *
                                </label>
                                <input
                                    type="number"
                                    class="form-control"
                                    id="caloriesPerHour"
                                    th:field="*{caloriesPerHour}"
                                    placeholder="ex: 400"
                                    min="1"
                                    step="0.1"
                                    required>
                                <div class="form-text">Nombre moyen de calories brûlées par heure</div>
                            </div>

                            <!-- Description -->
                            <div class="mb-3">
                                <label for="description" class="form-label">
                                    <i class="bi bi-chat-left-text"></i> Description
                                </label>
                                <textarea
                                    class="form-control"
                                    id="description"
                                    th:field="*{description}"
                                    placeholder="Description optionnelle du sport"
                                    rows="4"></textarea>
                                <div class="form-text">Description du sport (optionnel)</div>
                            </div>

                            <!-- Buttons -->
                            <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check"></i>
                                <span th:if="${sport.idS == 0}">Créer le sport</span>
                                <span th:if="${sport.idS != 0}">Mettre à jour</span>
                            </button>
                                <a th:href="@{/admin/sports}" class="btn btn-secondary">
                                    <i class="bi bi-x"></i> Annuler
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Form validation
        (function() {
            'use strict';
            window.addEventListener('load', function() {
                var forms = document.querySelectorAll('.needs-validation');
                Array.prototype.slice.call(forms).forEach(function(form) {
                    form.addEventListener('submit', function(event) {
                        if (!form.checkValidity()) {
                            event.preventDefault();
                            event.stopPropagation();
                        }
                        form.classList.add('was-validated');
                    }, false);
                });
            }, false);
        })();
    </script>
</body>
</html>
