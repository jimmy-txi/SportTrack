<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Création d'objectif</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<h1>Nouvel Objectif</h1>
<form th:action="@{/objectives}" method="post">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required><br><br>

    <label for="description">Description : </label>
    <textarea id="description" name="description" required></textarea><br><br>

    <label for="sportId">Sport :</label>
    <select id="sportId" name="sportId" required>
        <option value="" disabled selected>Sélectionnez un sport</option>
        <option th:each="sport : ${sports}" th:value="${sport.idS}" th:text="${sport.name}">Sport</option>
    </select><br><br>

    <button type="submit">Créer l'objectif</button>
</form>
</body>
