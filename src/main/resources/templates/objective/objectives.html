<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mes Objectifs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div th:insert="~{fragments/header :: header}"></div>

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0">Liste des objectifs</h1>
            <a th:href="@{/objectives/add}" class="btn btn-light btn-sm">
                <i class="bi bi-plus-circle"></i> Nouvel Objectif
            </a>
        </div>
        
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>Nom</th>
                    <th>Description</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="objective : ${objectives}">
                    <td class="fw-bold" th:text="${objective.name}">Nom</td>
                    <td th:text="${objective.description}">Description</td>
                    <td class="text-center">
                        <button type="button" class="btn btn-outline-danger btn-sm" 
                                data-bs-toggle="modal" 
                                th:data-bs-target="'#deleteModal' + ${objective.id}">
                            <i class="bi bi-trash"></i>
                        </button>

                        <div class="modal fade" th:id="'deleteModal' + ${objective.id}" tabindex="-1" aria-hidden="true">
                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5 class="modal-title">Confirmer la suppression</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                    </div>
                                    <div class="modal-body text-start">
                                        Êtes-vous sûr de vouloir supprimer l'objectif : <br>
                                        <strong th:text="${objective.name}"></strong> ?
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                                        <form th:action="@{/objectives/delete/{id}(id=${objective.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-danger">Supprimer</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(objectives)}">
                    <td colspan="3" class="text-center text-muted italic">Aucun objectif défini.</td>
                </tr>
                </tbody>
            </table>
        </div>
        
        <div class="card-footer text-center py-3">
            <a th:href="@{/}" class="btn btn-link text-decoration-none text-secondary">
                <i class="bi bi-arrow-left"></i> Retour à l'accueil
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
